name: HTML Validate
on:
  push:
    paths: ["**.html"]
  pull_request:
    paths: ["**.html"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install html-validate
        run: npm install -g html-validate
      - name: Run validation
        run: html-validate "*.html"
