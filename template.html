<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} | Henry Zimmerman</title>
  <meta name="description" content="">
  <link rel="icon" href="https://www.henryzimmerman.net/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&family=Spectral:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #07091a;
      --gold:         #c4a258;
      --gold-dim:     rgba(196,162,88,0.25);
      --text:         #e2ddd4;
      --text-dim:     rgba(226,221,212,0.72);
      --panel:        rgba(7,9,26,0.84);
      --panel-border: rgba(196,162,88,0.18);
      --blue:         #78a5d2;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Spectral', Georgia, serif;
      font-size: 17px;
      line-height: 1.75;
    }

    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      padding: 22px 52px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(7,9,26,0.92) 0%, transparent 100%);
    }

    .nav-name {
      font-family: 'EB Garamond', serif;
      font-size: 18px;
      letter-spacing: 0.04em;
      color: var(--text);
      text-decoration: none;
      font-style: italic;
    }
    .nav-name:hover { color: var(--gold); text-decoration: none; }

    .nav-back {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-decoration: none;
      text-transform: uppercase;
      border-bottom: 1px solid var(--panel-border);
      padding-bottom: 2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav-back:hover {
      color: var(--gold);
      border-color: var(--gold-dim);
      text-decoration: none;
    }

    .article-wrap {
      max-width: 65ch;
      margin: 0 auto;
      padding: 120px 28px 100px;
    }

    .article-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .article-title {
      font-family: 'EB Garamond', serif;
      font-size: clamp(26px, 5vw, 40px);
      font-weight: 400;
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 10px;
    }

    .article-byline {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 36px;
    }

    .article-divider {
      border: none;
      border-top: 1px solid var(--panel-border);
      margin-bottom: 40px;
    }

    .article-body p {
      margin-bottom: 1.4em;
      text-indent: 0;
    }

    .article-body h2 {
      font-family: 'EB Garamond', serif;
      font-size: 24px;
      font-weight: 400;
      color: var(--text);
      margin: 2.4em 0 0.9em;
      letter-spacing: 0.01em;
    }

    .article-body h3 {
      font-family: 'EB Garamond', serif;
      font-size: 20px;
      font-weight: 400;
      font-style: italic;
      color: var(--text-dim);
      margin: 2em 0 0.7em;
    }

    /* Back to Top Button CSS */
    #back-to-top {
      position: fixed;
      bottom: 32px;
      right: 32px;
      z-index: 300;
      width: 40px;
      height: 40px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      color: var(--gold);
      font-size: 18px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, border-color 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0;
      padding: 0;
    }
    #back-to-top.visible {
      opacity: 1;
      pointer-events: auto;
    }
    #back-to-top:hover {
      border-color: var(--gold);
    }

    @media (max-width: 600px) {
      nav { padding: 18px 24px; }
      .article-wrap { padding: 90px 18px 72px; }
      #back-to-top { bottom: 20px; right: 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-name">Henry Zimmerman</a>
    <a href="index.html#research" class="nav-back">← Back to Research</a>
  </nav>

  <article class="article-wrap">
    <header>
      <div class="article-meta">Research Post</div>
      <h1 class="article-title">{{TITLE}}</h1>
      <div class="article-byline">Henry Zimmerman</div>
    </header>
    
    <hr class="article-divider">

    <div class="article-body">
      </div>

   
  </article>

  <button id="back-to-top" aria-label="Back to top">
    &uarr;
  </button>

  <script>
    const backToTopBtn = document.getElementById('back-to-top');
    
    window.addEventListener('scroll', () => {
      if (window.scrollY > 500) {
        backToTopBtn.classList.add('visible');
      } else {
        backToTopBtn.classList.remove('visible');
      }
    }, { passive: true });

    backToTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>

</body>
</html>
