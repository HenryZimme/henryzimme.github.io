<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} | Henry Zimmerman</title>
  <meta name="description" content="">
  <link rel="icon" href="henryzimmerman.net/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&family=Spectral:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #07091a;
      --gold:         #c4a258;
      --gold-dim:     rgba(196,162,88,0.25);
      --text:         #e2ddd4;
      --text-dim:     rgba(226,221,212,0.72);
      --panel:        rgba(7,9,26,0.84);
      --panel-border: rgba(196,162,88,0.18);
      --blue:         #78a5d2;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Spectral', Georgia, serif;
      font-size: 17px;
      line-height: 1.75;
    }

    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      padding: 22px 52px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(7,9,26,0.92) 0%, transparent 100%);
    }

    .nav-name {
      font-family: 'EB Garamond', serif;
      font-size: 18px;
      letter-spacing: 0.04em;
      color: var(--text);
      text-decoration: none;
      font-style: italic;
    }
    .nav-name:hover { color: var(--gold); text-decoration: none; }

    .nav-back {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-decoration: none;
      text-transform: uppercase;
      border-bottom: 1px solid var(--panel-border);
      padding-bottom: 2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav-back:hover {
      color: var(--gold);
      border-color: var(--gold-dim);
      text-decoration: none;
    }

    .article-wrap {
      max-width: 65ch;
      margin: 0 auto;
      padding: 120px 28px 100px;
    }

    .article-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .article-title {
      font-family: 'EB Garamond', serif;
      font-size: clamp(26px, 5vw, 40px);
      font-weight: 400;
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 10px;
    }

    .article-byline {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 36px;
    }

    .article-divider {
      border: none;
      border-top: 1px solid var(--panel-border);
      margin-bottom: 40px;
    }

    .article-body p {
      margin-bottom: 1.4em;
      text-indent: 0;
    }


    .article-body h2 {
      font-family: 'EB Garamond', serif;
      font-size: 24px;
      font-weight: 400;
      color: var(--text);
      margin: 2.4em 0 0.9em;
      letter-spacing: 0.01em;
    }

    .article-body h3 {
      font-family: 'EB Garamond', serif;
      font-size: 20px;
      font-weight: 400;
      font-style: italic;
      color: var(--text-dim);
      margin: 2em 0 0.7em;
    }

    .article-body blockquote {
      border-left: 2px solid var(--gold-dim);
      margin: 1.6em 0;
      padding: 0.2em 0 0.2em 1.4em;
      color: var(--text-dim);
      font-style: italic;
    }


    .article-body ul,
    .article-body ol {
      padding-left: 1.8em;
      margin-bottom: 1.4em;
    }
    .article-body li { margin-bottom: 0.4em; }

    .article-body figure {
      margin: 2em 0;
      display: block;
    }
    .article-body figure img {
      width: 100%;
      height: auto;
      display: block;
      border: 1px solid var(--panel-border);
    }
    .article-body figcaption {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      color: var(--text-dim);
      opacity: 0.7;
      margin-top: 8px;
      line-height: 1.5;
      letter-spacing: 0.03em;
    }

    /* references heading injected by build script */
    .article-body h2.references-heading {
      font-size: 20px;
      color: var(--gold);
      margin-top: 3em;
    }

    /* inline superscript footnote refs from pandoc */
    .article-body sup {
      font-size: 0.72em;
      line-height: 0;
      vertical-align: super;
    }
    .article-body sup a {
      color: var(--gold);
      text-decoration: none;
      padding: 0 1px;
      border-bottom: 1px solid var(--gold-dim);
      transition: color 0.12s, border-color 0.12s;
    }
    .article-body sup a:hover {
      color: var(--text);
      border-color: var(--text-dim);
      text-decoration: none;
    }

    /* pandoc footnote section */
    .article-body section.footnotes {
      margin-top: 3.5em;
      padding-top: 1.6em;
      border-top: 1px solid var(--panel-border);
    }
    .article-body section.footnotes::before {
      content: 'Notes';
      display: block;
      font-family: 'EB Garamond', serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--gold);
      letter-spacing: 0.02em;
      margin-bottom: 1em;
    }
    .article-body section.footnotes ol {
      padding-left: 1.6em;
    }
    .article-body section.footnotes li {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.6;
      margin-bottom: 0.7em;
    }
    .article-body section.footnotes li p { margin-bottom: 0; }
    .article-body section.footnotes a.footnote-back {
      color: var(--gold);
      margin-left: 4px;
      font-size: 0.85em;
      text-decoration: none;
      border-bottom: none;
    }
    .article-body section.footnotes a.footnote-back:hover { color: var(--text); }

    .article-back {
      display: inline-block;
      margin-top: 52px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-decoration: none;
      text-transform: uppercase;
      border-bottom: 1px solid var(--panel-border);
      padding-bottom: 2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .article-back:hover { color: var(--gold); border-color: var(--gold-dim); text-decoration: none; }

    @media (max-width: 600px) {
      nav { padding: 18px 24px; }
      .article-wrap { padding: 90px 18px 72px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-name">Henry Zimmerman</a>
    <a href="index.html" class="nav-back">&larr; Return to Portfolio</a>
  </nav>

  <div class="article-wrap">
    <h1 class="article-title">{{TITLE}}</h1>
    <div class="article-body">
      {{CONTENT}}
    </div>
    <a href="index.html#writing" class="article-back">&larr; Back to writing</a>
  </div>

</body>
</html>
