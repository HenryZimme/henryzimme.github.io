<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} | Henry Zimmerman</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <link rel="icon" href="https://www.henryzimmerman.net/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/subpages.css">
  <style>
    /* page-specific overrides */
    .article-wrap {
      max-width: 680px;
      padding: 160px 24px 100px;
    }

    .article-title {
      font-size: clamp(32px, 5vw, 44px);
      line-height: 1.1;
      margin: 0 0 32px;
    }

    .article-body blockquote {
      border-left: 2px solid var(--gold-dim);
      margin: 40px 0;
      padding-left: 28px;
      font-style: italic;
      color: var(--text-dim);
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-name">Henry Zimmerman</a>
    <a href="index.html#writing" class="nav-back">← Back to Writing</a>
  </nav>

  <article class="article-wrap">
    <header>
      <div class="article-meta">{{CATEGORY}}</div>
      <h1 class="article-title">{{TITLE}}</h1>
    </header>
    
    <hr class="article-divider">

    <div class="article-body">
      </div>

    <footer class="footer-nav">
      <a href="index.html#writing" class="nav-back">← Back to Portfolio</a>
      <a href="descartes.html" class="nav-back">Next: On Descartes →</a>
    </footer>
      </article>

  <button id="back-to-top" aria-label="Back to top">
    &uarr;
  </button>

  <script>
    const btt = document.getElementById('back-to-top');
    window.addEventListener('scroll', () => {
      if (window.pageYOffset > 300) btt.classList.add('visible');
      else btt.classList.remove('visible');
    });
    btt.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
