<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="vig" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#111630"/>
      <stop offset="100%" stop-color="#03040d"/>
    </radialGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#d4a843" stop-opacity="0.0"/>
    </linearGradient>
    <radialGradient id="rg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f06050" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f06050" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#8ab8ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6a9ec8" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="c">
      <circle cx="16" cy="16" r="15"/>
    </clipPath>
  </defs>

  <circle cx="16" cy="16" r="15" fill="#07091a"/>
  
  <g clip-path="url(#c)">
    <circle cx="16" cy="16" r="15" fill="url(#vig)" opacity="0.9"/>

    <!-- grid lines -->
    <line x1="3" y1="24" x2="29" y2="24" stroke="#d4a843" stroke-width="0.3" opacity="0.22" stroke-linecap="round"/>
    <line x1="18" y1="7" x2="18" y2="24" stroke="#d4a843" stroke-width="0.3" opacity="0.1" stroke-linecap="round"/>

    <!-- fixed orbital path (closed, encircles cepheid) -->
    <path d="M 6,12 C 8,18 11,24 15,23 C 17,23 18,20 20,10 C 22,10 24,13 28,15 L 28,24 L 6,24 Z"
          fill="url(#area)" stroke="#d4a843" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

    <!-- red companion (demoted) -->
    <circle cx="9" cy="14" r="3.5" fill="url(#rg)" opacity="0.6"/>
    <g transform="translate(9,14)" fill="#f06050" opacity="0.7">
      <ellipse cx="0" cy="0" rx="2.2" ry="0.18"/>
      <ellipse cx="0" cy="0" rx="0.18" ry="2.2"/>
      <circle cx="0" cy="0" r="0.7"/>
    </g>

    <!-- blue cepheid (dominant focal point) -->
    <circle cx="15" cy="16" r="6.5" fill="url(#bg2)"/>
    <g transform="translate(15,16)">
      <g fill="url(#bg2)" opacity="0.85">
        <ellipse cx="0" cy="0" rx="5.5" ry="0.45"/>
        <ellipse cx="0" cy="0" rx="0.45" ry="5.5"/>
      </g>
      <circle cx="0" cy="0" r="1.3" fill="#ffffff" opacity="1.0"/>
    </g>
  </g>
</svg>
