<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="vig" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#111630"/>
      <stop offset="100%" stop-color="#03040d"/>
    </radialGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#d4a843" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#d4a843" stop-opacity="0.0"/>
    </linearGradient>
    <radialGradient id="rg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f06050" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f06050" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8ab8ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6a9ec8" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="c">
      <circle cx="16" cy="16" r="15"/>
    </clipPath>
  </defs>

  <circle cx="16" cy="16" r="15" fill="#07091a"/>

  <g clip-path="url(#c)">
    <circle cx="16" cy="16" r="15" fill="url(#vig)" opacity="0.9"/>

    <line x1="3" y1="24" x2="29" y2="24"
          stroke="#d4a843" stroke-width="0.35" opacity="0.28" stroke-linecap="round"/>
    <line x1="18" y1="7" x2="18" y2="24"
          stroke="#d4a843" stroke-width="0.35" opacity="0.15" stroke-linecap="round"/>

    <path
      d="M 4,10
         C 6,16 9,25 13,24
         C 15,24 16,22 18,7
         C 20,7 22,13 28,15
         L 28,24 L 4,24 Z"
      fill="url(#area)"
    />

    <path
      d="M 4,10
         C 6,16 9,25 13,24
         C 15,24 16,22 18,7
         C 20,7 22,13 28,15"
      fill="none"
      stroke="#d4a843"
      stroke-width="2.0"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <circle cx="10" cy="15" r="4" fill="url(#rg)"/>
    <g transform="translate(10,15)" fill="#f06050" opacity="0.7">
      <ellipse cx="0" cy="0" rx="2.5" ry="0.15"/>
      <ellipse cx="0" cy="0" rx="0.15" ry="2.5"/>
      <circle cx="0" cy="0" r="0.6"/>
    </g>

    <circle cx="21" cy="18" r="6" fill="url(#bg2)"/>
    <g transform="translate(21,18)">
      <g fill="#8ab8ff" opacity="0.95">
        <ellipse cx="0" cy="0" rx="4" ry="0.35"/>
        <ellipse cx="0" cy="0" rx="0.35" ry="4"/>
      </g>
      <circle cx="0" cy="0" r="1.1" fill="#ffffff"/>
    </g>
  </g>
</svg>
